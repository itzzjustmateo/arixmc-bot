name: "public-info"
description: "Show information about this server"

# Only administrators can use the command
default_permissions: "administrator"

actions:
  - id: message
    args:
      components:
        - type: container
          components:
            - type: section
              accessory:
                type: thumbnail
                url: "%guild_icon%"
              components:
                - type: text-display
                  content: |
                    ## 🏰 Server Information — %guild_name%

                    ### 👑 Server Owner
                    • **Owner:** %owner_mention% (%owner_username%)
                    • **Owner ID:** `%owner_id%`
                    • **Account Created:** %owner_create_date%

                    ### 📅 Server Details
                    • **Guild ID:** `%guild_id%`
                    • **Created On:** %guild_create_date%

                    ### 🚀 Boost Status
                    • **Boosts:** %guild_boosts%
                    • **Server Level:** %guild_level%

        - type: container
          components:
            - type: text-display
              content: |
                ## 📊 Server Statistics

                ### 👥 Members
                • **Humans:** %guild_members%
                • **Bots:** %guild_bots%
                • **Total Members:** %guild_users%
